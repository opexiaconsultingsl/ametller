<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Control Stock</title>

  <style>
    :root{
      --ink:#0e1b2a;
      --green:#7fe28f;
      --red:#e69095;
      --stroke:#0e1b2a;
      --radius:16px;
      --shadow:0 8px 20px rgba(0,0,0,.15);
    }

    *{
      box-sizing:border-box;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
    }

    body{
      margin:0;
      background:#fff;
      display:flex;
      justify-content:center;
      padding:24px 14px;
      color:var(--ink);
    }

    .app{
      width:min(430px,100%);
    }

    .header{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:28px;
    }

    .logo{
      width:60px;
      height:60px;
    }

    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    h1{
      margin:0;
      font-size:30px;
      letter-spacing:.5px;
      white-space:nowrap; /* CONTROL STOCK en una sola fila */
    }

    .field{
      margin-bottom:18px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    label{
      font-size:13px;
      font-weight:600;
      opacity:.7;
    }

    input, textarea{
      padding:14px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.25);
      font-size:16px;
      outline:none;
    }

    textarea{
      min-height:70px;
      resize:vertical;
    }

    .btn{
      width:100%;
      padding:20px;
      border-radius:var(--radius);
      border:2px solid var(--stroke);
      font-weight:800;
      font-size:26px;
      letter-spacing:.5px;
      cursor:pointer;
      box-shadow:var(--shadow);
      margin-top:16px;
    }

    .green{
      background:var(--green);
      color:#fff; /* ENTRADA en blanco */
    }

    .red{
      background:var(--red);
      color:#fff;
      margin-top:28px; /* más separación entre ENTRADA y SALIDA */
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div class="logo">
        <img src="assets/logo-ametller.png" alt="Ametller">
      </div>
      <h1>CONTROL STOCK</h1>
    </div>

    <div class="field">
      <label>CÓDIGO</label>
      <input id="codigo" placeholder="Introduce código..." autocomplete="off">
    </div>

    <div class="field">
      <label>UBICACIÓN</label>
      <input id="ubicacion" placeholder="Ej: Almacén A - Estantería 3" autocomplete="off">
    </div>

    <div class="field">
      <label>NOTAS</label>
      <textarea id="notas" placeholder="Observaciones..."></textarea>
    </div>

    <button class="btn green" onclick="sendMovement('ENTRADA')">ENTRADA</button>
    <button class="btn red" onclick="sendMovement('SALIDA')">SALIDA</button>
  </div>

  <script>
    // ✅ Tu URL /exec ya puesta
    const API_URL = "https://script.google.com/macros/s/AKfycbw7GEVYNRMdSAF3S5ReGXmwKKLsODGUHeRVj4YE4sCr2xRENDJBdLA-cnfzRdZh2nEN/exec";

    async function sendMovement(tipo){
      const codigo = document.getElementById("codigo").value.trim();
      const ubicacion = document.getElementById("ubicacion").value.trim();
      const notas = document.getElementById("notas").value.trim();

      if(!codigo){
        alert("Introduce un código.");
        return;
      }

      const payload = {
        tipo,
        codigo,
        ubicacion,
        notas,
        ts_client: new Date().toISOString()
      };

      try{
        const res = await fetch(API_URL,{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify(payload)
        });

        const data = await res.json().catch(() => ({}));

        if(res.ok && data.ok){
          alert("Movimiento registrado");
          document.getElementById("codigo").value = "";
          document.getElementById("notas").value = "";
          document.getElementById("codigo").focus();
        }else{
          alert("Error guardando movimiento");
          console.error("Respuesta API:", data);
        }

      }catch(e){
        alert("Error de conexión con la base de datos");
        console.error(e);
      }
    }
  </script>
</body>
</html>

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Control Stock</title>

  <style>
    :root{
      --ink:#0e1b2a;
      --green:#7fe28f;
      --red:#e69095;
      --stroke:#0e1b2a;
      --radius:16px;
      --shadow:0 8px 20px rgba(0,0,0,.15);
    }

    *{
      box-sizing:border-box;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
    }

    body{
      margin:0;
      background:#fff;
      display:flex;
      justify-content:center;
      padding:24px 14px;
      color:var(--ink);
    }

    .app{
      width:min(430px,100%);
    }

    .header{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:28px;
    }

    .logo{
      width:60px;
      height:60px;
    }

    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    h1{
      margin:0;
      font-size:30px;
      letter-spacing:.5px;
      white-space:nowrap;
    }

    .field{
      margin-bottom:18px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    label{
      font-size:13px;
      font-weight:600;
      opacity:.7;
    }

    input, textarea{
      padding:14px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.25);
      font-size:16px;
      outline:none;
    }

    textarea{
      min-height:70px;
      resize:vertical;
    }

    .btn{
      width:100%;
      padding:20px;
      border-radius:var(--radius);
      border:2px solid var(--stroke);
      font-weight:800;
      font-size:26px;
      letter-spacing:.5px;
      cursor:pointer;
      box-shadow:var(--shadow);
      margin-top:16px;
      transition: opacity .15s ease, filter .15s ease;
    }

    .green{
      background:var(--green);
      color:#fff;
    }

    .red{
      background:var(--red);
      color:#fff;
      margin-top:28px;
    }

    /* Estado deshabilitado */
    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
      filter: grayscale(30%);
      box-shadow:none;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div class="logo">
        <img src="Ametller.png" alt="Ametller">
      </div>
      <h1>CONTROL STOCK</h1>
    </div>

    <div class="field">
      <label>CÓDIGO</label>
      <input id="codigo" placeholder="Lee código de barras..." autocomplete="off" />
    </div>

    <div class="field">
      <label>UBICACIÓN</label>
      <input id="ubicacion" placeholder="Lee código de ubicación" autocomplete="off" />
    </div>

    <div class="field">
      <label>NOTAS (opcional)</label>
      <textarea id="notas" placeholder="Observaciones..."></textarea>
    </div>

    <button id="btnEntrada" class="btn green" onclick="sendMovement('ENTRADA')" disabled>ENTRADA</button>
    <button id="btnSalida" class="btn red" onclick="sendMovement('SALIDA')" disabled>SALIDA</button>
  </div>

  <script>
    // URL /exec (Apps Script)
    const API_URL = "https://script.google.com/macros/s/AKfycbwk-o8aVh4Ao6MuWbYHpt_gLqlHiNvpE4grhQtiDCAI3nlVj57vNc2vkIMXXbFVROMbig/exec";

    const elCodigo = document.getElementById("codigo");
    const elUbic = document.getElementById("ubicacion");
    const elNotas = document.getElementById("notas");
    const btnEntrada = document.getElementById("btnEntrada");
    const btnSalida = document.getElementById("btnSalida");

    function refreshButtons(){
      const codigo = elCodigo.value.trim();
      const ubic = elUbic.value.trim();

      // Reglas:
      // ENTRADA => requiere código + ubicación
      btnEntrada.disabled = !(codigo && ubic);

      // SALIDA => requiere solo código
      btnSalida.disabled = !codigo;
    }

    elCodigo.addEventListener("input", refreshButtons);
    elUbic.addEventListener("input", refreshButtons);
    elNotas.addEventListener("input", refreshButtons);

    // estado inicial
    refreshButtons();

    async function sendMovement(tipo){
      const codigo = elCodigo.value.trim();
      const ubicacion = elUbic.value.trim();
      const notas = elNotas.value.trim();

      // Validaciones (por seguridad, además del disabled)
      if(!codigo){
        alert("Introduce un CÓDIGO.");
        return;
      }
      if(tipo === "ENTRADA" && !ubicacion){
        alert("Para ENTRADA, la UBICACIÓN es obligatoria.");
        return;
      }
      // Para SALIDA, ubicación puede ir vacía (o aunque esté, la enviamos sin problema)

      // Envío por GET (evita CORS con GitHub Pages)
      const url = new URL(API_URL);
      url.searchParams.set("tipo", tipo);
      url.searchParams.set("codigo", codigo);
      url.searchParams.set("ubicacion", ubicacion); // para SALIDA puede ir vacío
      url.searchParams.set("notas", notas);
      url.searchParams.set("ts_client", new Date().toISOString());

      try{
        const res = await fetch(url.toString(), { method: "GET" });
        const data = await res.json().catch(() => ({}));

        if(res.ok && data.ok){
          alert("Movimiento registrado");

          // Limpieza: código siempre; notas siempre
          elCodigo.value = "";
          elNotas.value = "";

          // Ubicación: yo la dejaría para ENTRADAS repetitivas (más rápido)
          // Si prefieres limpiarla también, descomenta:
          // elUbic.value = "";

          elCodigo.focus();
          refreshButtons();
        }else{
          alert("Error guardando movimiento");
          console.error("Respuesta API:", data);
        }
      }catch(e){
        alert("Error de conexión con la base de datos");
        console.error(e);
      }
    }
  </script>
</body>
</html>
